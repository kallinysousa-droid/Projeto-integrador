<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello Word</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            /* Ativar o flexbox para o alinhamento */
            display: flex;

            /* Centraliza horizontalmente o conteúdo */
            justify-content: center;

            /* Centraliza verticalmente o conteúdo */
            align-items: center;

            /* Define altura como 100% da altura da tela */
            height: 100vh;

            /* Cor de fundo cinza claro */
            background-color: #F0F0F0;

            /* Define a fonte do texto */
            font-family: "Outfit", sans-serif;
        }

        /* Estilos aplicados ao titulo (h1) */
        h1 {
            /* cor do texto */
            color: #2C7BE5;

            /* Tamanho da fonte (3 vezes o tamanho padrão) */
            font-size: 32px;

            /* Barra azul ao redor do texto */
            border: 6px double #2C7BE5;

            /* Espaçamento interno (topo/baixo = 20px, Lados = 40px) */
            padding: 20px 40px;

            /* Arredondamento das bordas */
            border-radius: 50%;

            /* Fundo branco para destacar o texto */
            background-color: #FFF;
        }
    </style>
</head>
<body>
    <!-- Texto exibido no navegador -->
    <h1>Hello World</h1>
</body>
</html>
