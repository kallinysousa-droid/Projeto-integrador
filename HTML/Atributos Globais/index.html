<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos Globais</title>
    <style>
       #.mensagem{
        color: crimson;
       }
        .destaque{
          color: gold;
        }
       
        body{
            background-color: bisque;
        }
    </style>
</head>
<body>
    <h1>Atributos Globais</h1>
    
    <!-- id- Indentificador Unico-->
     <p style="color: darkred;" id="mensagem" > Olá, Mundo</p>
     <!--class (clase)- Permite agrupar varios elementos com o mesmo 
     estilo e comportamento-->

     <p class="destaque"> Texto Importante</p>
     <p class="destaque"> Outro texto Importante</p>

     <!-- style (estilo online)- Aplica css direto mo elemento-->
      <h1 style="color: blue;">Titulo azul</h1>
</body>
</html>
