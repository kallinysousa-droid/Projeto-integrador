<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemento de Formulario</title>
</head>
<body>
    
       <h1>Elemento de Formulario</h1>
            <p>Os elementos de Formulários me HTML permitem coletar dados do usuario
                 (como login cadastro, pesquisa, etc.) </p>
            <form action="" method="">
                <fieldset>
                    <legend>contato</legend>
             

                     <label for="nome">Nome/label>
                      <input id="nome" name="nome" type="text" required><br>
         

                      <label for="email">Email</label>
                        <input id="email" name="email" type="email" required><br>

                     <label for="senha">Senha</label>
                       <input id="senha" name="senha" type="password" required><br>
          
                 </fieldset>
            </form>
</body>
</html>
