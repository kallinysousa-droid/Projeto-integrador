<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemento de Tabela</title>
</head>
<body>
    <h1>Elemento de Tabela</h1>
        <p>Os elementos de tabela em HTML são usasdos para organizar
            os dados em linhas e colunas, como uma planilha.
        </p>

        <table border="1">
            <caption>tabela de produtos </caption>
            <tread>
            <tr>
                <tr>produto</tr>
                <tr>preço</tr>
            </tr>
            </tread>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>R$ 80,00</td>
            </tr>
        </tbody>
        <tbody>
            <tr>
                <td>Mouse</td>
                <td>R$ 55,00</td>
            </tr>
        </tbody>
        <tfoot>

            <td>total </td>
            <td>R$135,00</td>
        </tfoot>




<!--table= defina uma tabela-->
<!--tr= (table row) defina uma linha-->
<!--tr= (table header) defina uma celula de cabeçario-->
<!--td= (table data) defina uma celula comum-->
<!--thead, tbody, tfoot= estrutura semanica da tabela-->

</body>
</html>
